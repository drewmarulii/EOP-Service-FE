<div class="container">
    <div class="surface-section px-4 py-6 text-center">
        <div class="text-green-700 font-bold mb-3">
            WELCOME TO EOP, {{ uid }} {{ role }}
        </div>
        <div class="text-900 font-bold text-5xl mb-3">
            Manage Church Data
        </div>
        <div class="text-700 text-2xl">
            God Bless!
        </div>
    </div>

    <div class="grid mt-4">
        <div class="col-12 md:col-6 lg:col-4">
            <div class="surface-card shadow-2 p-3 border-round">
                <div class="flex justify-content-between">
                    <div>
                        <span class="block text-500">Users</span>
                        <div class="text-900 text-2xl font-bold">
                            {{ userSize }}
                        </div>
                    </div>
                    <div class="flex align-items-center justify-content-center bg-blue-100 border-circle"
                        style="width:3rem;height:3rem">
                        <i class="pi pi-users text-blue-500 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 md:col-6 lg:col-4">
            <div class="surface-card shadow-2 p-3 border-round">
                <div class="flex justify-content-between">
                    <div>
                        <span class="block text-500">On Going Events</span>
                        <div class="text-900 text-2xl font-bold">
                            {{ eventSize }}
                        </div>
                    </div>
                    <div class="flex align-items-center justify-content-center bg-green-100 border-circle"
                        style="width:3rem;height:3rem">
                        <i class="pi pi-calendar text-green-500 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
        <div class="col-12 md:col-6 lg:col-4">
            <div class="surface-card shadow-2 p-3 border-round">
                <div class="flex justify-content-between">
                    <div>
                        <span class="block text-500">On Going Request</span>
                        <div class="text-900 text-2xl font-bold">
                            {{ requestSize }}
                        </div>
                    </div>
                    <div class="flex align-items-center justify-content-center bg-green-100 border-circle"
                        style="width:3rem;height:3rem">
                        <i class="pi pi-ticket text-green-500 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
