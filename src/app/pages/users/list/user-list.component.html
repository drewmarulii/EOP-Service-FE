<div class="container mt-4">
    <div class="flex align-items-center justify-content-between mb-3">
        <div class="flex align-items-center">
            <h2 class="m-0 text-xl font-bold flex align-items-center gap-2">
                <i class="pi pi-users"></i>
                User List
            </h2>
        </div>
        <p-button label="Add User" icon="pi pi-user-plus" (onClick)="createUser()">
        </p-button>
    </div>
    <p-card>
        <p-table [value]="users" [paginator]="true" [rows]="10" [rowsPerPageOptions]="[5, 10, 20, 50]"
            [showCurrentPageReport]="true" currentPageReportTemplate="Showing {first} to {last} of {totalRecords} users"
            responsiveLayout="scroll" styleClass="p-datatable-sm">
            <ng-template pTemplate="header">
                <tr>
                    <th id="no">No</th>
                    <th id="nik">NIK</th>
                    <th id="fullName">Full Name</th>
                    <th id="phoneNumber">Mobile Phone</th>
                    <th id="maritalStatus">Marital Status</th>
                    <th id="action">Action</th>
                </tr>
            </ng-template>
            <ng-template pTemplate="body" let-user let-rowIndex="rowIndex">
                <tr>
                    <td>{{ rowIndex + 1 }}</td>
                    <td>{{ user.nik }}</td>
                    <td>{{ user.fullName }}</td>
                    <td>{{ user.mobilePhone }}</td>
                    <td>{{ user.maritalStatus }}</td>
                    <td>
                        <div class="flex gap-2">
                            <p-button icon="pi pi-eye" severity="info" [text]="true" pTooltip="View User"
                                tooltipPosition="top" (onClick)="viewUser(user.id)">
                            </p-button>
                            <p-button icon="pi pi-user-edit" severity="warning" [text]="true" pTooltip="Edit User"
                                tooltipPosition="top" (onClick)="editUser(user.id)">
                            </p-button>
                            <p-button icon="pi pi-trash" severity="danger" [text]="true" pTooltip="Delete User"
                                tooltipPosition="top" (onClick)="deleteUser(user.id)">
                            </p-button>
                        </div>
                    </td>
                </tr>
            </ng-template>
            <ng-template pTemplate="emptymessage">
                <tr>
                    <td colspan="6" class="text-center">
                        No users found.
                    </td>
                </tr>
            </ng-template>
        </p-table>
    </p-card>
</div>
