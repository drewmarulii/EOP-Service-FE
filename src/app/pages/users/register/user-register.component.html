<div class="container mt-4">
    <div class="flex align-items-center mb-3">
        <p-button icon="pi pi-arrow-left" text="true" severity="secondary" (onClick)="goBack()" class="mr-1"></p-button>
        <h2 class="m-0 text-xl font-bold flex align-items-center gap-2">
            Create User <i class="pi pi-user-plus mr-2"></i>
        </h2>
    </div>

    <p-card>
        <form [formGroup]="formRegister" (ngSubmit)="create()">
            <div class="grid">
                <div class="field col-12 md:col-6 mb-4">
                    <label for="uid" class="font-semibold block mb-2">
                        User ID <span class="text-red-500">*</span>
                    </label>
                    <input pInputText id="uid" type="text" class="w-full" formControlName="uid"
                        placeholder="Enter user ID" />
                </div>

                <div class="field col-12 md:col-6 mb-4">
                    <label for="password" class="font-semibold block mb-2">
                        Password <span class="text-red-500">*</span>
                    </label>
                    <p-password id="password" formControlName="password" [toggleMask]="true" [feedback]="false"
                        styleClass="w-full" inputStyleClass="w-full" placeholder="Enter password">
                    </p-password>
                </div>
                <div class="field col-12 md:col-6 mb-4">
                    <label for="role" class="font-semibold block mb-2">
                        Role <span class="text-red-500">*</span>
                    </label>
                    <p-dropdown id="role" [options]="roles" optionLabel="roleName" optionValue="roleName"
                        placeholder="Select a role" [showClear]="true" formControlName="role" styleClass="w-full">
                    </p-dropdown>
                </div>
            </div>

            <p-divider align="left">
                <span class="font-semibold">Personal Information</span>
            </p-divider>

            <div formGroupName="userPersonRequest">
                <div class="grid">
                    <div class="field col-12 md:col-6 mb-4">
                        <label for="nik" class="font-semibold block mb-2">
                            NIK / Passport ID <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="nik" type="text" class="w-full" formControlName="nik"
                            placeholder="Enter NIK / Passport ID" />
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="fullName" class="font-semibold block mb-2">
                            Full Name <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="fullName" type="text" class="w-full" formControlName="fullName"
                            placeholder="Enter full name" />
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="email" class="font-semibold block mb-2">
                            Email <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="email" type="email" class="w-full" formControlName="email"
                            placeholder="Enter email address" />
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="mobilePhone" class="font-semibold block mb-2">
                            Phone Number <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="mobilePhone" type="text" class="w-full" formControlName="mobilePhone"
                            placeholder="Enter phone number" />
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="placeOfBirth" class="font-semibold block mb-2">
                            Place of Birth <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="placeOfBirth" type="text" class="w-full" formControlName="placeOfBirth"
                            placeholder="Enter place of birth" />
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="dateOfBirth" class="font-semibold block mb-2">
                            Date of Birth <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="dateOfBirth" type="date" class="w-full" formControlName="dateOfBirth" />
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="maritalStatus" class="font-semibold block mb-2">
                            Marital Status <span class="text-red-500">*</span>
                        </label>
                        <p-dropdown id="maritalStatus" [options]="maritalStatuses" placeholder="Select marital status"
                            [showClear]="true" formControlName="maritalStatus" styleClass="w-full">
                        </p-dropdown>
                    </div>

                    <div class="field col-12 md:col-6 mb-4">
                        <label for="address" class="font-semibold block mb-2">
                            Address <span class="text-red-500">*</span>
                        </label>
                        <input pInputText id="address" type="text" class="w-full" formControlName="address"
                            placeholder="Enter Address" />
                    </div>
                </div>
            </div>

            <div class="flex justify-content-end gap-2 mt-4">
                <p-button type="button" label="Cancel" icon="pi pi-times" severity="secondary" (onClick)="onCancel()">
                </p-button>
                <p-button type="submit" label="Save" icon="pi pi-check">
                </p-button>
            </div>
        </form>
    </p-card>
</div>
